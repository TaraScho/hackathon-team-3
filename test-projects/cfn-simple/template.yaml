AWSTemplateFormatVersion: '2010-09-09'
Description: Simple test stack - lightweight AWS resources for Datadog onboarding testing

Resources:
  # --- S3 Bucket ---
  TestBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cfn-simple-test-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: cfn-simple

  # --- SQS Queue ---
  TestQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: cfn-simple-test-queue
      MessageRetentionPeriod: 60
      Tags:
        - Key: Project
          Value: cfn-simple

  # --- SNS Topic ---
  TestTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: cfn-simple-test-topic
      Tags:
        - Key: Project
          Value: cfn-simple

  # --- DynamoDB Table ---
  TestTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cfn-simple-test-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      Tags:
        - Key: Project
          Value: cfn-simple

  # --- SSM Parameter ---
  TestParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /cfn-simple/test-param
      Type: String
      Value: test-value
      Tags:
        Project: cfn-simple

Outputs:
  BucketName:
    Value: !Ref TestBucket
  QueueUrl:
    Value: !Ref TestQueue
  TopicArn:
    Value: !Ref TestTopic
  TableName:
    Value: !Ref TestTable
  ParameterName:
    Value: !Ref TestParameter
