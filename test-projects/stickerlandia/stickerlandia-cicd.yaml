AWSTemplateFormatVersion: "2010-09-09"
Description: Stickerlandia CI/CD - ECR, CodeBuild, CodePipeline

Parameters:
  StaticAssetsBucket:
    Type: String
    Description: S3 bucket containing static assets (service source zips)

  StaticAssetsKeyPrefix:
    Type: String
    Description: S3 key prefix for static assets

Resources:

  #############################################################################
  # S3 Buckets
  #############################################################################

  SourceStageBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: "aws:kms"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: cicd

  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: cicd

  #############################################################################
  # ECR Repositories
  #############################################################################

  WebBackendECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    Properties:
      RepositoryName: stickerlandia/web-backend
      EmptyOnDelete: true
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: web-backend

  StickerAwardECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    Properties:
      RepositoryName: stickerlandia/sticker-award
      EmptyOnDelete: true
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: sticker-award

  StickerCatalogueECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    Properties:
      RepositoryName: stickerlandia/sticker-catalogue
      EmptyOnDelete: true
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: sticker-catalogue

  UserManagementServiceECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    Properties:
      RepositoryName: stickerlandia/user-management-service
      EmptyOnDelete: true
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: user-management

  UserManagementMigrationECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    Properties:
      RepositoryName: stickerlandia/user-management-migration
      EmptyOnDelete: true
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: user-management

  LeaderboardECR:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    Properties:
      RepositoryName: stickerlandia/leaderboard
      EmptyOnDelete: true
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: leaderboard

  #############################################################################
  # SeedS3 Lambda - copies service source zips from StaticAssets to SourceStage
  #############################################################################

  SeedS3FunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3CopyPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !GetAtt SourceStageBucket.Arn
                  - !Sub "${SourceStageBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource:
                  - !Sub "arn:aws:s3:::${StaticAssetsBucket}"
                  - !Sub "arn:aws:s3:::${StaticAssetsBucket}/${StaticAssetsKeyPrefix}*"

  SeedS3Function:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt SeedS3FunctionRole.Arn
      MemorySize: 1024
      Runtime: python3.12
      Timeout: 900
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          s3_client = boto3.client("s3")

          def handler(event, context):
            print(event)
            if event["RequestType"] == "Create":
              try:
                src_bucket = event["ResourceProperties"]["SourceBucket"]
                src_key = event["ResourceProperties"]["SourceKey"]
                dst_bucket = event["ResourceProperties"]["DestinationBucket"]
                dst_key = event["ResourceProperties"]["DestinationKey"]
                copy_source = {"Bucket": src_bucket, "Key": src_key}
                s3_client.copy(
                  CopySource=copy_source,
                  Bucket=dst_bucket,
                  Key=dst_key,
                )
                cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                print("Caught exception: {}".format(e))
                cfnresponse.send(event, context, cfnresponse.FAILED, {})
            else:
              print("Unsupported event, handling as successful")
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: cicd

  SeedS3WebBackend:
    Type: Custom::SeedS3
    Properties:
      ServiceTimeout: 15
      ServiceToken: !GetAtt SeedS3Function.Arn
      SourceBucket: !Ref StaticAssetsBucket
      SourceKey: !Sub "${StaticAssetsKeyPrefix}services/web-backend.zip"
      DestinationBucket: !Ref SourceStageBucket
      DestinationKey: web-backend.zip

  SeedS3StickerAward:
    Type: Custom::SeedS3
    Properties:
      ServiceTimeout: 15
      ServiceToken: !GetAtt SeedS3Function.Arn
      SourceBucket: !Ref StaticAssetsBucket
      SourceKey: !Sub "${StaticAssetsKeyPrefix}services/sticker-award.zip"
      DestinationBucket: !Ref SourceStageBucket
      DestinationKey: sticker-award.zip

  SeedS3StickerCatalogue:
    Type: Custom::SeedS3
    Properties:
      ServiceTimeout: 15
      ServiceToken: !GetAtt SeedS3Function.Arn
      SourceBucket: !Ref StaticAssetsBucket
      SourceKey: !Sub "${StaticAssetsKeyPrefix}services/sticker-catalogue.zip"
      DestinationBucket: !Ref SourceStageBucket
      DestinationKey: sticker-catalogue.zip

  SeedS3UserManagement:
    Type: Custom::SeedS3
    Properties:
      ServiceTimeout: 15
      ServiceToken: !GetAtt SeedS3Function.Arn
      SourceBucket: !Ref StaticAssetsBucket
      SourceKey: !Sub "${StaticAssetsKeyPrefix}services/user-management.zip"
      DestinationBucket: !Ref SourceStageBucket
      DestinationKey: user-management.zip

  SeedS3Leaderboard:
    Type: Custom::SeedS3
    Properties:
      ServiceTimeout: 15
      ServiceToken: !GetAtt SeedS3Function.Arn
      SourceBucket: !Ref StaticAssetsBucket
      SourceKey: !Sub "${StaticAssetsKeyPrefix}services/leaderboard.zip"
      DestinationBucket: !Ref SourceStageBucket
      DestinationKey: leaderboard.zip

  #############################################################################
  # IAM Roles
  #############################################################################

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetAuthorizationToken
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !Sub "${ArtifactBucket.Arn}/*"
                  - !Sub "${SourceStageBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !GetAtt SourceStageBucket.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${StaticAssetsBucket}"
                  - !Sub "arn:aws:s3:::${StaticAssetsBucket}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:datadog/*"

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                Resource:
                  - !Sub "${SourceStageBucket.Arn}/*"
                  - !GetAtt SourceStageBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
                  - !GetAtt ArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "*"

  TriggerBuildFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CodeBuildTriggerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource:
                  - !GetAtt WebBackendBuildProject.Arn
                  - !GetAtt StickerAwardBuildProject.Arn
                  - !GetAtt StickerCatalogueBuildProject.Arn
                  - !GetAtt UserManagementBuildProject.Arn
                  - !GetAtt LeaderboardBuildProject.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt SourceStageBucket.Arn
                  - !Sub "${SourceStageBucket.Arn}/*"

  #############################################################################
  # CodeBuild Projects
  #############################################################################

  WebBackendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "WebBackend-${AWS::StackName}"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: REPOSITORY_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${WebBackendECR}"
          - Name: CONTAINER_NAME
            Value: web-backend
          - Name: DD_GIT_REPOSITORY_URL
            Value: https://github.com/DataDog/stickerlandia
          - Name: DD_GIT_COMMIT_SHA
            Value: 359515424f69da4da41cbacfc232a2304e19da19
          - Name: DD_GIT_BRANCH
            Value: main
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 18
              commands:
                - npm install -g @datadog/datadog-ci
                - echo "Downloading Datadog static analyzer..."
                - curl -L -o /tmp/dsa.zip https://github.com/DataDog/datadog-static-analyzer/releases/latest/download/datadog-static-analyzer-x86_64-unknown-linux-gnu.zip
                - unzip -o /tmp/dsa.zip -d /tmp/dsa
                - chmod +x /tmp/dsa/datadog-static-analyzer
                - echo "Downloading Datadog SBOM generator..."
                - curl -L -o /tmp/sbom-gen.zip https://github.com/DataDog/datadog-sbom-generator/releases/latest/download/datadog-sbom-generator_linux_amd64.zip
                - unzip -o /tmp/sbom-gen.zip -d /tmp/sbom-gen
                - chmod +x /tmp/sbom-gen/datadog-sbom-generator
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:=latest}
                - export DD_API_KEY=$(aws secretsmanager get-secret-value --secret-id datadog/api-key --query SecretString --output text --region $AWS_DEFAULT_REGION)
                - export DD_APP_KEY=$(aws secretsmanager get-secret-value --secret-id datadog/app-key --query SecretString --output text --region $AWS_DEFAULT_REGION)
                - export DD_SITE="datadoghq.com"
                - export DD_GIT_COMMIT_AUTHOR_EMAIL="chad.vibes@stickerlandia.dev"
                - export DD_GIT_COMMIT_AUTHOR_NAME="Chad Vibes"
                - export DD_GIT_COMMIT_COMMITTER_EMAIL="chad.vibes@stickerlandia.dev"
                - export DD_GIT_COMMIT_COMMITTER_NAME="Chad Vibes"
            build:
              commands:
                - echo Building Docker image...
                - docker build -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$IMAGE_TAG .
            post_build:
              commands:
                - echo Pushing Docker image...
                - docker push $REPOSITORY_URI:latest
                - docker push $REPOSITORY_URI:$IMAGE_TAG
                # --- SAST scan ---
                - echo "Running SAST scan on web-backend..."
                - mkdir -p /tmp/scan-source/web-backend
                - cp *.js *.json /tmp/scan-source/web-backend/ || true
                - /tmp/dsa/datadog-static-analyzer -i /tmp/scan-source -o /tmp/sast-report.sarif -f sarif || true
                - datadog-ci sarif upload /tmp/sast-report.sarif --service $CONTAINER_NAME --env production --tags env:production || true
                # --- SCA scan ---
                - echo "Running SCA scan on web-backend..."
                - /tmp/sbom-gen/datadog-sbom-generator scan --output=/tmp/sbom.json . || true
                - git clone --depth 1 $DD_GIT_REPOSITORY_URL /tmp/git-ctx || true
                - cd /tmp/git-ctx && datadog-ci sbom upload /tmp/sbom.json --service $CONTAINER_NAME --env production --tags env:production || true
                - cd $CODEBUILD_SRC_DIR
                - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:latest > imageDefinition.json
          artifacts:
            files:
              - imageDefinition.json
      TimeoutInMinutes: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: web-backend

  StickerAwardBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "StickerAward-${AWS::StackName}"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: REPOSITORY_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${StickerAwardECR}"
          - Name: CONTAINER_NAME
            Value: sticker-award
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:=latest}
            build:
              commands:
                - echo Building Docker image...
                - docker build -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$IMAGE_TAG .
            post_build:
              commands:
                - echo Pushing Docker image...
                - docker push $REPOSITORY_URI:latest
                - docker push $REPOSITORY_URI:$IMAGE_TAG
                - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:latest > imageDefinition.json
          artifacts:
            files:
              - imageDefinition.json
      TimeoutInMinutes: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: sticker-award

  StickerCatalogueBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "StickerCatalogue-${AWS::StackName}"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: REPOSITORY_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${StickerCatalogueECR}"
          - Name: CONTAINER_NAME
            Value: sticker-catalogue
          - Name: DD_GIT_REPOSITORY_URL
            Value: https://github.com/DataDog/stickerlandia
          - Name: DD_GIT_COMMIT_SHA
            Value: 359515424f69da4da41cbacfc232a2304e19da19
          - Name: DD_GIT_BRANCH
            Value: main
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 18
              commands:
                - npm install -g @datadog/datadog-ci
                - echo "Downloading Datadog static analyzer..."
                - curl -L -o /tmp/dsa.zip https://github.com/DataDog/datadog-static-analyzer/releases/latest/download/datadog-static-analyzer-x86_64-unknown-linux-gnu.zip
                - unzip -o /tmp/dsa.zip -d /tmp/dsa
                - chmod +x /tmp/dsa/datadog-static-analyzer
                - echo "Downloading Datadog SBOM generator..."
                - curl -L -o /tmp/sbom-gen.zip https://github.com/DataDog/datadog-sbom-generator/releases/latest/download/datadog-sbom-generator_linux_amd64.zip
                - unzip -o /tmp/sbom-gen.zip -d /tmp/sbom-gen
                - chmod +x /tmp/sbom-gen/datadog-sbom-generator
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:=latest}
                - export DD_API_KEY=$(aws secretsmanager get-secret-value --secret-id datadog/api-key --query SecretString --output text --region $AWS_DEFAULT_REGION)
                - export DD_APP_KEY=$(aws secretsmanager get-secret-value --secret-id datadog/app-key --query SecretString --output text --region $AWS_DEFAULT_REGION)
                - export DD_SITE="datadoghq.com"
                - export DD_GIT_COMMIT_AUTHOR_EMAIL="chad.vibes@stickerlandia.dev"
                - export DD_GIT_COMMIT_AUTHOR_NAME="Chad Vibes"
                - export DD_GIT_COMMIT_COMMITTER_EMAIL="chad.vibes@stickerlandia.dev"
                - export DD_GIT_COMMIT_COMMITTER_NAME="Chad Vibes"
            build:
              commands:
                - echo Building Docker image...
                - docker build -t $REPOSITORY_URI:latest -t $REPOSITORY_URI:$IMAGE_TAG .
            post_build:
              commands:
                - echo Pushing Docker image...
                - docker push $REPOSITORY_URI:latest
                - docker push $REPOSITORY_URI:$IMAGE_TAG
                # --- SAST scan ---
                - echo "Running SAST scan on sticker-catalogue..."
                - mkdir -p /tmp/scan-source/sticker-catalogue
                - cp -r src pom.xml /tmp/scan-source/sticker-catalogue/
                - /tmp/dsa/datadog-static-analyzer -i /tmp/scan-source -o /tmp/sast-report.sarif -f sarif || true
                - datadog-ci sarif upload /tmp/sast-report.sarif --service $CONTAINER_NAME --env production --tags env:production || true
                # --- SCA scan ---
                - echo "Running SCA scan on sticker-catalogue..."
                - /tmp/sbom-gen/datadog-sbom-generator scan --output=/tmp/sbom.json . || true
                - git clone --depth 1 $DD_GIT_REPOSITORY_URL /tmp/git-ctx || true
                - cd /tmp/git-ctx && datadog-ci sbom upload /tmp/sbom.json --service $CONTAINER_NAME --env production --tags env:production || true
                - cd $CODEBUILD_SRC_DIR
                - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:latest > imageDefinition.json
          artifacts:
            files:
              - imageDefinition.json
      TimeoutInMinutes: 45
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: sticker-catalogue

  UserManagementBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "UserManagement-${AWS::StackName}"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: SERVICE_REPO_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${UserManagementServiceECR}"
          - Name: MIGRATION_REPO_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${UserManagementMigrationECR}"
          - Name: CONTAINER_NAME
            Value: user-service
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $SERVICE_REPO_URI
                - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
                - IMAGE_TAG=${COMMIT_HASH:=latest}
            build:
              commands:
                - echo Building service Docker image...
                - docker build -f src/Stickerlandia.UserManagement.Api/Dockerfile -t $SERVICE_REPO_URI:latest -t $SERVICE_REPO_URI:$IMAGE_TAG .
                - echo Building migration Docker image...
                - docker build -f src/Stickerlandia.UserManagement.MigrationService/Dockerfile -t $MIGRATION_REPO_URI:latest -t $MIGRATION_REPO_URI:$IMAGE_TAG .
            post_build:
              commands:
                - echo Pushing Docker images...
                - docker push $SERVICE_REPO_URI:latest
                - docker push $SERVICE_REPO_URI:$IMAGE_TAG
                - docker push $MIGRATION_REPO_URI:latest
                - docker push $MIGRATION_REPO_URI:$IMAGE_TAG
                - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $SERVICE_REPO_URI:latest > imageDefinition.json
          artifacts:
            files:
              - imageDefinition.json
      TimeoutInMinutes: 45
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: user-management

  LeaderboardBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "Leaderboard-${AWS::StackName}"
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: REPOSITORY_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${LeaderboardECR}"
          - Name: CONTAINER_NAME
            Value: leaderboard
          - Name: DD_GIT_REPOSITORY_URL
            Value: https://github.com/DataDog/gameday-demo-app-services
          - Name: DD_GIT_COMMIT_SHA
            Value: 92db868deb4625ef2a275e99a14bd08bfb8bc135
          - Name: DD_GIT_BRANCH
            Value: main
          - Name: DD_VERSION
            Value: "2.0.0"
          - Name: FINDINGS_BUCKET
            Value: !Ref StaticAssetsBucket
          - Name: FINDINGS_PREFIX
            Value: !Sub "${StaticAssetsKeyPrefix}services/leaderboard/security-findings"
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            install:
              runtime-versions:
                nodejs: 18
              commands:
                - npm install -g @datadog/datadog-ci
                - echo "Downloading Datadog static analyzer..."
                - curl -L -o /tmp/dsa.zip https://github.com/DataDog/datadog-static-analyzer/releases/latest/download/datadog-static-analyzer-x86_64-unknown-linux-gnu.zip
                - unzip -o /tmp/dsa.zip -d /tmp/dsa
                - chmod +x /tmp/dsa/datadog-static-analyzer
                - echo "Downloading Datadog SBOM generator..."
                - curl -L -o /tmp/sbom-gen.zip https://github.com/DataDog/datadog-sbom-generator/releases/latest/download/datadog-sbom-generator_linux_amd64.zip
                - unzip -o /tmp/sbom-gen.zip -d /tmp/sbom-gen
                - chmod +x /tmp/sbom-gen/datadog-sbom-generator
            pre_build:
              commands:
                - echo Logging in to Amazon ECR...
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPOSITORY_URI
                - export DD_API_KEY=$(aws secretsmanager get-secret-value --secret-id datadog/api-key --query SecretString --output text --region $AWS_DEFAULT_REGION)
                - export DD_APP_KEY=$(aws secretsmanager get-secret-value --secret-id datadog/app-key --query SecretString --output text --region $AWS_DEFAULT_REGION)
                - export DD_SITE="datadoghq.com"
                - export DD_GIT_COMMIT_AUTHOR_EMAIL="chad.vibes@stickerlandia.dev"
                - export DD_GIT_COMMIT_AUTHOR_NAME="Chad Vibes"
                - export DD_GIT_COMMIT_COMMITTER_EMAIL="chad.vibes@stickerlandia.dev"
                - export DD_GIT_COMMIT_COMMITTER_NAME="Chad Vibes"
            build:
              commands:
                - echo "Building v1.0.0 (safe) image..."
                - mkdir -p /tmp/v1
                - cp Dockerfile requirements.txt app.py consumer.py db.py /tmp/v1/
                - cp -r migrations /tmp/v1/
                - docker build -t $REPOSITORY_URI:1.0.0 /tmp/v1/
                - echo "Building v2.0.0 (vulnerable) image..."
                - mkdir -p /tmp/v2
                - cp Dockerfile requirements.txt app_v2.py consumer.py db.py /tmp/v2/
                - cp -r migrations /tmp/v2/
                - cp aws_config.py.template /tmp/v2/aws_config.py
                - mv /tmp/v2/app_v2.py /tmp/v2/app.py
                - docker build -t $REPOSITORY_URI:2.0.0 /tmp/v2/
                - docker tag $REPOSITORY_URI:2.0.0 $REPOSITORY_URI:latest
            post_build:
              commands:
                - echo Pushing Docker images...
                - docker push $REPOSITORY_URI:1.0.0
                - docker push $REPOSITORY_URI:2.0.0
                - docker push $REPOSITORY_URI:latest
                # === Main branch - real SAST scan of v1 (clean) code ===
                - echo "Running SAST scan on v1 (clean) code for main branch..."
                - export DD_GIT_BRANCH=main
                - mkdir -p /tmp/scan-source/stickerlandia/leaderboard-service
                - cp /tmp/v1/app.py /tmp/v1/consumer.py /tmp/v1/db.py /tmp/v1/requirements.txt /tmp/scan-source/stickerlandia/leaderboard-service/
                - /tmp/dsa/datadog-static-analyzer -i /tmp/scan-source -o /tmp/main-sast.sarif -f sarif || true
                - datadog-ci sarif upload /tmp/main-sast.sarif --service $CONTAINER_NAME --env production --tags env:production || true
                # --- SCA scan (main branch) ---
                - echo "Running SCA scan on leaderboard..."
                - /tmp/sbom-gen/datadog-sbom-generator scan --output=/tmp/sbom.json /tmp/scan-source || true
                - git clone --depth 1 $DD_GIT_REPOSITORY_URL /tmp/git-ctx || true
                - cd /tmp/git-ctx && datadog-ci sbom upload /tmp/sbom.json --service $CONTAINER_NAME --env production --tags env:production || true
                - cd $CODEBUILD_SRC_DIR
                # === Pre-crafted vuln findings (uploaded on main so they appear in default view) ===
                - echo "Uploading pre-crafted vulnerability findings..."
                - echo "Downloading pre-crafted security findings from S3..."
                - aws s3 cp s3://$FINDINGS_BUCKET/$FINDINGS_PREFIX/sast-leaderboard.sarif /tmp/sast-report.sarif || true
                - aws s3 cp s3://$FINDINGS_BUCKET/$FINDINGS_PREFIX/secrets-leaderboard.sarif /tmp/secrets-report.sarif || true
                - echo "Uploading SAST findings to Datadog..."
                - datadog-ci sarif upload /tmp/sast-report.sarif --service $CONTAINER_NAME --env production --tags env:production || true
                - echo "Uploading Secrets findings to Datadog..."
                - datadog-ci sarif upload /tmp/secrets-report.sarif --service $CONTAINER_NAME --env production --tags env:production || true
                - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:2.0.0 > imageDefinition.json
          artifacts:
            files:
              - imageDefinition.json
      TimeoutInMinutes: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: leaderboard

  #############################################################################
  # TriggerBuild Lambda - Starts CodeBuild and waits for completion
  #############################################################################

  TriggerBuildFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt TriggerBuildFunctionRole.Arn
      Runtime: python3.12
      Timeout: 900
      MemorySize: 128
      Code:
        ZipFile: |
          import boto3
          import time
          import cfnresponse

          cb = boto3.client('codebuild')

          def handler(event, context):
              print(event)
              if event['RequestType'] in ('Create', 'Update'):
                  try:
                      project = event['ResourceProperties']['ProjectName']
                      source_bucket = event['ResourceProperties'].get('SourceBucket')
                      source_key = event['ResourceProperties'].get('SourceKey')

                      if source_bucket and source_key:
                          build = cb.start_build(
                              projectName=project,
                              sourceTypeOverride='S3',
                              sourceLocationOverride='{}/{}'.format(source_bucket, source_key),
                              artifactsOverride={'type': 'NO_ARTIFACTS'}
                          )
                      else:
                          build = cb.start_build(projectName=project)
                      build_id = build['build']['id']
                      print('Started build: {}'.format(build_id))

                      # Poll for completion (max ~14 min with 900s Lambda timeout)
                      while True:
                          time.sleep(30)
                          remaining = context.get_remaining_time_in_millis()
                          if remaining < 60000:
                              cfnresponse.send(event, context, cfnresponse.FAILED,
                                  {'Error': 'Lambda timeout approaching, build still running: {}'.format(build_id)})
                              return

                          status = cb.batch_get_builds(ids=[build_id])['builds'][0]['buildStatus']
                          print('Build status: {}'.format(status))
                          if status == 'SUCCEEDED':
                              cfnresponse.send(event, context, cfnresponse.SUCCESS, {'BuildId': build_id})
                              return
                          elif status in ('FAILED', 'FAULT', 'TIMED_OUT', 'STOPPED'):
                              cfnresponse.send(event, context, cfnresponse.FAILED,
                                  {'Error': 'Build {}'.format(status), 'BuildId': build_id})
                              return
                          # IN_PROGRESS - keep polling
                  except Exception as e:
                      print('Exception: {}'.format(e))
                      cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
              else:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: cicd

