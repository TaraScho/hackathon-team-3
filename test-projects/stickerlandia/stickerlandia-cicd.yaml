  #############################################################################
  # Cleanup Buckets Lambda
  #############################################################################

  CleanupBucketsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3CleanupPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:GetObject
                Resource:
                  - !GetAtt SourceStageBucket.Arn
                  - !Sub "${SourceStageBucket.Arn}/*"
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

  CleanupBucketsFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt CleanupBucketsRole.Arn
      Runtime: python3.12
      Timeout: 900
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          s3 = boto3.resource('s3')

          def handler(event, context):
              print(event)
              if event['RequestType'] == 'Delete':
                  try:
                      buckets = event['ResourceProperties'].get('Buckets', [])
                      for bucket_name in buckets:
                          print('Emptying bucket: {}'.format(bucket_name))
                          bucket = s3.Bucket(bucket_name)
                          bucket.object_versions.all().delete()
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  except Exception as e:
                      print('Error: {}'.format(e))
                      cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})
              else:
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: cicd

  CleanupBuckets:
    Type: Custom::CleanupBuckets
    Properties:
      ServiceToken: !GetAtt CleanupBucketsFunction.Arn
      ServiceTimeout: 300
      Buckets:
        - !Ref SourceStageBucket
        - !Ref ArtifactBucket

