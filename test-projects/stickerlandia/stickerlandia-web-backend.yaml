AWSTemplateFormatVersion: "2010-09-09"
Description: Stickerlandia Web Backend Service - Node.js BFF, ECS Fargate, API Gateway Routes

Parameters:
  SharedStackName:
    Type: String
    Description: Name of the shared infrastructure stack (Stack 1) for importing outputs

  DatadogApiKeySecretArn:
    Type: String
    Description: Full ARN of the datadog/api-key secret (looked up by parent stack)

  ContainerImage:
    Type: String
    Description: ECR image URI for the web-backend container

Resources:
  #############################################################################
  # ECS Cluster
  #############################################################################

  WebBackendCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub stickerlandia-web-backend
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # CloudWatch Log Groups
  #############################################################################

  WebBackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/stickerlandia-web-backend
      RetentionInDays: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  DatadogAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/stickerlandia-web-backend-datadog
      RetentionInDays: 7
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # IAM Roles - ECS Task Execution Role
  #############################################################################

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub stickerlandia-web-backend-exec-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: DatadogApiKeyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:datadog/api-key*"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # IAM Roles - ECS Task Role (Minimal - BFF only proxies to other services)
  #############################################################################

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub stickerlandia-web-backend-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # No additional policies needed - web-backend is a BFF that proxies to other services
      # via HTTP, not AWS SDK calls
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # ECS Task Definition - Web Backend Service
  #############################################################################

  WebBackendTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub stickerlandia-web-backend
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: web-backend
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            # Node.js environment
            - Name: NODE_ENV
              Value: development
            # OAuth configuration (from CDK api.ts)
            - Name: OAUTH_ISSUER_INTERNAL
              Value:
                Fn::Sub:
                  - "https://${CloudFrontDomain}"
                  - CloudFrontDomain:
                      Fn::ImportValue: !Sub "${SharedStackName}-CloudFrontDomainName"
            - Name: OAUTH_CLIENT_ID
              Value: web-ui
            - Name: OAUTH_CLIENT_SECRET
              Value: stickerlandia-web-ui-secret-2025
            - Name: DEPLOYMENT_HOST_URL
              Value:
                Fn::Sub:
                  - "https://${CloudFrontDomain}"
                  - CloudFrontDomain:
                      Fn::ImportValue: !Sub "${SharedStackName}-CloudFrontDomainName"
            # Datadog APM environment variables
            - Name: DD_ENV
              Value: production
            - Name: DD_SERVICE
              Value: web-backend
            - Name: DD_VERSION
              Value: "1.0.2"
            - Name: DD_GIT_COMMIT_SHA
              Value: 06a35dd6e3597ee20474b9944d8205f67a1277c6
            - Name: DD_GIT_REPOSITORY_URL
              Value: https://github.com/Datadog/stickerlandia
            - Name: DD_AGENT_HOST
              Value: 127.0.0.1
            - Name: DD_TRACE_ENABLED
              Value: "true"
            - Name: DD_TRACE_ROUTE_TEMPLATE_RESOURCE_NAMES_ENABLED
              Value: "true"
            - Name: DD_LOGS_INJECTION
              Value: "true"
            - Name: DD_RUNTIME_METRICS_ENABLED
              Value: "true"
            - Name: DD_PROFILING_ENABLED
              Value: "true"
            - Name: DD_IAST_ENABLED
              Value: "true"
            - Name: ECS_ENABLE_CONTAINER_METADATA
              Value: "true"
          # No container health check - CDK doesn't define one for web-backend
          # Service health is determined by Cloud Map / Service Discovery
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WebBackendLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web-backend
        # Datadog Agent Sidecar Container
        - Name: datadog-agent
          Image: public.ecr.aws/datadog/agent:latest
          Essential: false
          PortMappings:
            - ContainerPort: 8126
              Protocol: tcp
            - ContainerPort: 8125
              Protocol: udp
          Environment:
            - Name: DD_APM_ENABLED
              Value: "true"
            - Name: DD_APM_NON_LOCAL_TRAFFIC
              Value: "true"
            - Name: ECS_FARGATE
              Value: "true"
            - Name: DD_SITE
              Value: datadoghq.com
            - Name: DD_ENV
              Value: production
            - Name: DD_SERVICE
              Value: web-backend
            - Name: DD_VERSION
              Value: "1.0.2"
            - Name: DD_LOG_LEVEL
              Value: ERROR
          Secrets:
            - Name: DD_API_KEY
              ValueFrom: !Ref DatadogApiKeySecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DatadogAgentLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: datadog
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # Service Discovery
  #############################################################################

  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: backend.api
      NamespaceId:
        Fn::ImportValue: !Sub "${SharedStackName}-ServiceDiscoveryNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # ECS Service
  #############################################################################

  WebBackendService:
    Type: AWS::ECS::Service
    DependsOn:
      - WebBackendApiIntegration
    Properties:
      ServiceName: !Sub stickerlandia-web-backend
      Cluster: !Ref WebBackendCluster
      TaskDefinition: !Ref WebBackendTaskDefinition
      DesiredCount: 1
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${SharedStackName}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${SharedStackName}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${SharedStackName}-SharedSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt ServiceDiscoveryService.Arn
          ContainerName: web-backend
          ContainerPort: 3000
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: web-backend

  #############################################################################
  # API Gateway Integration
  #############################################################################

  WebBackendApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: ServiceDiscoveryService
    Properties:
      ApiId:
        Fn::ImportValue: !Sub "${SharedStackName}-HttpApiId"
      IntegrationType: HTTP_PROXY
      IntegrationUri: !GetAtt ServiceDiscoveryService.Arn
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId:
        Fn::ImportValue: !Sub "${SharedStackName}-VpcLinkId"
      PayloadFormatVersion: "1.0"

  AppApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: !Sub "${SharedStackName}-HttpApiId"
      RouteKey: "ANY /api/app/{proxy+}"
      Target: !Sub "integrations/${WebBackendApiIntegration}"

#############################################################################
# Outputs
#############################################################################

Outputs:
  WebBackendClusterArn:
    Description: Web Backend ECS Cluster ARN
    Value: !GetAtt WebBackendCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  WebBackendClusterName:
    Description: Web Backend ECS Cluster Name
    Value: !Ref WebBackendCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ServiceDiscoveryServiceArn:
    Description: Service Discovery Service ARN
    Value: !GetAtt ServiceDiscoveryService.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceDiscoveryServiceArn"
