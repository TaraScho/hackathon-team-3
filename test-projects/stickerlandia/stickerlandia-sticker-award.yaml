AWSTemplateFormatVersion: "2010-09-09"
Description: Stickerlandia Sticker Award Service - ECS Fargate, SQS, EventBridge, API Gateway Routes

Parameters:
  SharedStackName:
    Type: String
    Description: Name of the shared infrastructure stack (Stack 1) for importing outputs

  TeamLambdaSourceBucket:
    Type: String
    Description: S3 bucket containing Lambda source code

  TeamLambdaSourceKey:
    Type: String
    Description: S3 key prefix for Lambda source code

  DatadogApiKeySecretArn:
    Type: String
    Description: Full ARN of the datadog/api-key secret (looked up by parent stack)

  ContainerImage:
    Type: String
    Description: ECR image URI for the sticker-award container

Resources:
  #############################################################################
  # SQS Queues - User Registered Events
  #############################################################################

  UserRegisteredDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: stickers-user-registered-dlq
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  UserRegisteredQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: stickers-user-registered
      VisibilityTimeout: 30
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UserRegisteredDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  # Allow EventBridge to send messages to the queue
  UserRegisteredQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref UserRegisteredQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridgeToSendMessage
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt UserRegisteredQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub
                  - "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${EventBusName}/stickers-user-registered-rule"
                  - EventBusName:
                      Fn::ImportValue: !Sub "${SharedStackName}-EventBusName"

  #############################################################################
  # EventBridge Rule - Route User Registered Events to SQS
  #############################################################################

  UserRegisteredEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: stickers-user-registered-rule
      Description: Route user registered events to sticker-award service SQS queue
      EventBusName:
        Fn::ImportValue: !Sub "${SharedStackName}-EventBusName"
      EventPattern:
        source:
          - !Sub "stickerlandia.users"
        detail-type:
          - "users.userRegistered.v1"
      State: ENABLED
      Targets:
        - Arn: !GetAtt UserRegisteredQueue.Arn
          Id: UserRegisteredTarget
      # Note: AWS::Events::Rule does NOT support Tags in CloudFormation

  #############################################################################
  # Connection String Formatter - Custom Resource
  # Creates a formatted connection string secret from Aurora credentials
  #############################################################################

  ConnectionStringFormatterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
        - PolicyName: ReadSourceSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  Fn::ImportValue: !Sub "${SharedStackName}-DBSecretArn"
        - PolicyName: ManageConnectionStringSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:UpdateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:stickerlandia/awards/*"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  ConnectionStringFormatterLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub stickerlandia-award-conn-string-formatter
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt ConnectionStringFormatterRole.Arn
      Code:
        ZipFile: |
          const https = require("https");
          const url = require("url");
          const { SecretsManagerClient, GetSecretValueCommand, CreateSecretCommand, UpdateSecretCommand, DeleteSecretCommand } = require("@aws-sdk/client-secrets-manager");

          async function sendResponse(event, context, status, data, physicalResourceId, reason) {
            const responseBody = JSON.stringify({
              Status: status,
              Reason: reason || `See CloudWatch Log Stream: ${context.logStreamName}`,
              PhysicalResourceId: physicalResourceId || context.logStreamName,
              StackId: event.StackId,
              RequestId: event.RequestId,
              LogicalResourceId: event.LogicalResourceId,
              Data: data || {}
            });

            console.log("Response body:", responseBody);

            const parsedUrl = url.parse(event.ResponseURL);
            const options = {
              hostname: parsedUrl.hostname,
              port: 443,
              path: parsedUrl.path,
              method: "PUT",
              headers: {
                "content-type": "",
                "content-length": responseBody.length
              }
            };

            return new Promise((resolve, reject) => {
              const req = https.request(options, (res) => {
                console.log(`CFN response status: ${res.statusCode}`);
                resolve();
              });
              req.on("error", (err) => {
                console.error("CFN response error:", err);
                reject(err);
              });
              req.write(responseBody);
              req.end();
            });
          }

          async function createOrUpdateSecret(client, secretName, secretValue, description) {
            let arn;
            try {
              const result = await client.send(new UpdateSecretCommand({
                SecretId: secretName,
                SecretString: secretValue,
                Description: description,
              }));
              arn = result.ARN;
              console.log(`Updated secret: ${secretName}, ARN: ${arn}`);
            } catch (e) {
              if (e.name === "ResourceNotFoundException") {
                const result = await client.send(new CreateSecretCommand({
                  Name: secretName,
                  SecretString: secretValue,
                  Description: description,
                }));
                arn = result.ARN;
                console.log(`Created secret: ${secretName}, ARN: ${arn}`);
              } else {
                throw e;
              }
            }
            return arn;
          }

          exports.handler = async (event, context) => {
            console.log("Event:", JSON.stringify(event, null, 2));

            const sourceSecretArn = event.ResourceProperties.SourceSecretArn;
            const databaseName = event.ResourceProperties.DatabaseName;
            const secretNamePrefix = event.ResourceProperties.SecretNamePrefix;
            // Host passed explicitly since Aurora ManageMasterUserPassword doesn't include it in secret
            const dbHost = event.ResourceProperties.DatabaseHost;
            const physicalResourceId = event.PhysicalResourceId || `${secretNamePrefix}-db-creds`;

            const smClient = new SecretsManagerClient({});

            try {
              if (event.RequestType === "Delete") {
                try {
                  await smClient.send(new DeleteSecretCommand({
                    SecretId: `${secretNamePrefix}/connection-string`,
                    ForceDeleteWithoutRecovery: true
                  }));
                  console.log(`Deleted secret: ${secretNamePrefix}/connection-string`);
                } catch (e) {
                  if (e.name !== "ResourceNotFoundException") {
                    console.warn(`Failed to delete secret:`, e);
                  }
                }
                await sendResponse(event, context, "SUCCESS", {}, physicalResourceId);
                return;
              }

              // Get the source RDS secret value
              const secretResponse = await smClient.send(new GetSecretValueCommand({ SecretId: sourceSecretArn }));
              const secret = JSON.parse(secretResponse.SecretString);

              // Host from explicit parameter, username/password from secret
              const host = dbHost || secret.host;
              const port = secret.port || 5432;
              const username = secret.username;
              const password = secret.password;

              // Validate required fields from RDS secret
              if (!host || !username || password === undefined || password === null) {
                throw new Error(`Missing required fields in RDS secret. host=${!!host}, username=${!!username}, password=${password !== undefined && password !== null}`);
              }

              // URL-encode credentials to handle special characters in URLs
              // This is critical for passwords containing %, @, :, /, etc.
              const encodedPassword = encodeURIComponent(password);
              const encodedUsername = encodeURIComponent(username);

              // Create PostgreSQL URL format connection string (required by Go app)
              const connStr = `postgresql://${encodedUsername}:${encodedPassword}@${host}:${port}/${databaseName}?sslmode=require`;

              const connectionStringArn = await createOrUpdateSecret(
                smClient,
                `${secretNamePrefix}/connection-string`,
                connStr,
                `Database connection string for ${databaseName} (auto-generated)`
              );

              await sendResponse(event, context, "SUCCESS", {
                ConnectionStringArn: connectionStringArn,
                SecretName: `${secretNamePrefix}/connection-string`
              }, physicalResourceId);

            } catch (err) {
              console.error("Error:", err);
              await sendResponse(event, context, "FAILED", {}, physicalResourceId, err.message);
            }
          };
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  ConnectionStringFormatter:
    Type: Custom::ConnectionStringFormatter
    Properties:
      ServiceToken: !GetAtt ConnectionStringFormatterLambda.Arn
      SourceSecretArn:
        Fn::ImportValue: !Sub "${SharedStackName}-DBSecretArn"
      DatabaseName:
        Fn::ImportValue: !Sub "${SharedStackName}-DBName"
      # Host passed explicitly because Aurora ManageMasterUserPassword doesn't include it in secret
      DatabaseHost:
        Fn::ImportValue: !Sub "${SharedStackName}-DBClusterEndpoint"
      SecretNamePrefix: !Sub "stickerlandia/awards"
      # Increment to force custom resource re-execution when Lambda code changes
      Version: "6"

  #############################################################################
  # ECS Cluster
  #############################################################################

  StickerAwardCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub stickerlandia-sticker-award
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # CloudWatch Log Groups
  #############################################################################

  StickerAwardLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/stickerlandia-sticker-award
      RetentionInDays: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  DatadogAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/stickerlandia-sticker-award-datadog
      RetentionInDays: 7
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # IAM Roles - ECS Task Execution Role
  #############################################################################

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub stickerlandia-sticker-award-exec-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  # Access to formatted connection string secret (created by custom resource)
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:stickerlandia/awards/*"
        - PolicyName: DatadogApiKeyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:datadog/api-key*"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # IAM Roles - ECS Task Role
  #############################################################################

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub stickerlandia-sticker-award-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt UserRegisteredQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt UserRegisteredDLQ.Arn
        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource:
                  - Fn::ImportValue: !Sub "${SharedStackName}-EventBusArn"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # ECS Task Definition - Sticker Award Service
  #############################################################################

  StickerAwardTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub stickerlandia-sticker-award
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: sticker-award
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: ENV
              Value: production
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: CATALOGUE_BASE_URL
              Value:
                Fn::ImportValue: !Sub "${SharedStackName}-BaseUrl"
            - Name: USER_REGISTERED_QUEUE_URL
              Value: !Ref UserRegisteredQueue
            - Name: MESSAGING_PROVIDER
              Value: aws
            - Name: EVENT_BUS_NAME
              Value:
                Fn::ImportValue: !Sub "${SharedStackName}-EventBusName"
            # OAuth configuration for JWT validation
            # MUST include trailing slash - OpenIddict adds it to tokens, Go JWT does exact match.
            # The Go JWKSUrl() function handles trimming slashes when constructing the JWKS URL.
            - Name: OAUTH_ISSUER
              Value:
                Fn::Sub:
                  - "https://${CloudFrontDomain}/"
                  - CloudFrontDomain:
                      Fn::ImportValue: !Sub "${SharedStackName}-CloudFrontDomainName"
            # Datadog APM environment variables
            - Name: DD_ENV
              Value: production
            - Name: DD_SERVICE
              Value: sticker-award
            - Name: DD_VERSION
              Value: "1.0.2"
            - Name: DD_GIT_COMMIT_SHA
              Value: 06a35dd6e3597ee20474b9944d8205f67a1277c6
            - Name: DD_GIT_REPOSITORY_URL
              Value: https://github.com/Datadog/stickerlandia
            - Name: DD_AGENT_HOST
              Value: 127.0.0.1
            - Name: DD_TRACE_ENABLED
              Value: "true"
            - Name: DD_TRACE_ROUTE_TEMPLATE_RESOURCE_NAMES_ENABLED
              Value: "true"
            - Name: DD_LOGS_INJECTION
              Value: "true"
            - Name: DD_RUNTIME_METRICS_ENABLED
              Value: "true"
            - Name: DD_PROFILING_ENABLED
              Value: "true"
            - Name: DD_IAST_ENABLED
              Value: "true"
            - Name: ECS_ENABLE_CONTAINER_METADATA
              Value: "true"
          Secrets:
            # Formatted connection string from custom resource
            - Name: DATABASE_URL
              ValueFrom: !GetAtt ConnectionStringFormatter.ConnectionStringArn
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref StickerAwardLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: sticker-award
        # Datadog Agent Sidecar Container
        - Name: datadog-agent
          Image: public.ecr.aws/datadog/agent:latest
          Essential: false
          PortMappings:
            - ContainerPort: 8126
              Protocol: tcp
            - ContainerPort: 8125
              Protocol: udp
          Environment:
            - Name: DD_APM_ENABLED
              Value: "true"
            - Name: DD_APM_NON_LOCAL_TRAFFIC
              Value: "true"
            - Name: ECS_FARGATE
              Value: "true"
            - Name: DD_SITE
              Value: datadoghq.com
            - Name: DD_ENV
              Value: production
            - Name: DD_SERVICE
              Value: sticker-award
            - Name: DD_VERSION
              Value: "1.0.2"
            - Name: DD_LOG_LEVEL
              Value: ERROR
          Secrets:
            - Name: DD_API_KEY
              ValueFrom: !Ref DatadogApiKeySecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DatadogAgentLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: datadog
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # Service Discovery
  #############################################################################

  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: awards.api
      NamespaceId:
        Fn::ImportValue: !Sub "${SharedStackName}-ServiceDiscoveryNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # ECS Service
  #############################################################################

  StickerAwardService:
    Type: AWS::ECS::Service
    DependsOn:
      - StickerAwardApiIntegration
    Properties:
      ServiceName: !Sub stickerlandia-sticker-award
      Cluster: !Ref StickerAwardCluster
      TaskDefinition: !Ref StickerAwardTaskDefinition
      DesiredCount: 1
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${SharedStackName}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${SharedStackName}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${SharedStackName}-SharedSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt ServiceDiscoveryService.Arn
          ContainerName: sticker-award
          ContainerPort: 8080
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-award

  #############################################################################
  # API Gateway Integration
  #############################################################################

  StickerAwardApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: ServiceDiscoveryService
    Properties:
      ApiId:
        Fn::ImportValue: !Sub "${SharedStackName}-HttpApiId"
      IntegrationType: HTTP_PROXY
      IntegrationUri: !GetAtt ServiceDiscoveryService.Arn
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId:
        Fn::ImportValue: !Sub "${SharedStackName}-VpcLinkId"
      PayloadFormatVersion: "1.0"

  AwardsApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: !Sub "${SharedStackName}-HttpApiId"
      RouteKey: "ANY /api/awards/v1/{proxy+}"
      Target: !Sub "integrations/${StickerAwardApiIntegration}"

#############################################################################
# Outputs
#############################################################################

Outputs:
  StickerAwardClusterArn:
    Description: Sticker Award ECS Cluster ARN
    Value: !GetAtt StickerAwardCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  StickerAwardClusterName:
    Description: Sticker Award ECS Cluster Name
    Value: !Ref StickerAwardCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  UserRegisteredQueueUrl:
    Description: SQS Queue URL for user registered events
    Value: !Ref UserRegisteredQueue
    Export:
      Name: !Sub "${AWS::StackName}-UserRegisteredQueueUrl"

  UserRegisteredQueueArn:
    Description: SQS Queue ARN for user registered events
    Value: !GetAtt UserRegisteredQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-UserRegisteredQueueArn"

  ServiceDiscoveryServiceArn:
    Description: Service Discovery Service ARN
    Value: !GetAtt ServiceDiscoveryService.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceDiscoveryServiceArn"
