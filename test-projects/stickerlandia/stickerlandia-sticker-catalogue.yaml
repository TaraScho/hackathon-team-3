  #############################################################################
  # ECS Cluster
  #############################################################################

  StickerCatalogueCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub stickerlandia-sticker-catalogue
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # CloudWatch Log Groups
  #############################################################################

  StickerCatalogueLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/stickerlandia-sticker-catalogue
      RetentionInDays: 30
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  DatadogAgentLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/stickerlandia-sticker-catalogue-datadog
      RetentionInDays: 7
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # IAM Roles - ECS Task Execution Role
  #############################################################################

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub stickerlandia-sticker-catalogue-exec-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  # Access to 3 formatted secrets (created by custom resource)
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:stickerlandia/catalogue/*"
        - PolicyName: DatadogApiKeyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:datadog/api-key*"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # IAM Roles - ECS Task Role
  #############################################################################

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub stickerlandia-sticker-catalogue-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3StickerImagesAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StickerImagesBucket.Arn
                  - !Sub "${StickerImagesBucket.Arn}/*"
        - PolicyName: EventBridgePutEvents
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource:
                  - Fn::ImportValue: !Sub "${SharedStackName}-EventBusArn"
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # ECS Task Definition - Sticker Catalogue Service
  #############################################################################

  StickerCatalogueTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub stickerlandia-sticker-catalogue
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: sticker-catalogue
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            # Application environment
            - Name: ENV
              Value: production
            # OAuth configuration for JWT validation
            # Note: The IssuerValidationFilter normalizes trailing slashes, so issuer comparison
            # will work regardless of whether the issuer in the token has a trailing slash or not.
            # We omit the trailing slash here to avoid double slashes in the JWKS URL.
            - Name: OAUTH_ISSUER
              Value:
                Fn::Sub:
                  - "https://${CloudFrontDomain}"
                  - CloudFrontDomain:
                      Fn::ImportValue: !Sub "${SharedStackName}-CloudFrontDomainName"
            # Quarkus Database Configuration
            - Name: QUARKUS_DATASOURCE_DB_KIND
              Value: postgresql
            - Name: QUARKUS_DATASOURCE_DEVSERVICES_ENABLED
              Value: "false"
            - Name: QUARKUS_DATASOURCE_JDBC_ACQUISITION_TIMEOUT
              Value: 30S
            # Flyway baseline version - set to 0 so V1.0.0 migration runs
            # (default is 1, which skips V1.0.0 when baseline-on-migrate creates a new baseline)
            - Name: QUARKUS_FLYWAY_BASELINE_VERSION
              Value: "0"
            # S3 Configuration
            - Name: QUARKUS_S3_AWS_REGION
              Value: !Ref AWS::Region
            - Name: QUARKUS_S3_PATH_STYLE_ACCESS
              Value: "true"
            - Name: STICKER_IMAGES_BUCKET
              Value: !Ref StickerImagesBucket
            # EventBridge Messaging (AWS deployment)
            - Name: MESSAGING_PROVIDER
              Value: aws
            - Name: EVENT_BUS_NAME
              Value:
                Fn::ImportValue: !Sub "${SharedStackName}-EventBusName"
            # Datadog APM environment variables
            - Name: DD_ENV
              Value: production
            - Name: DD_SERVICE
              Value: sticker-catalogue
            - Name: DD_VERSION
              Value: "1.0.2"
            - Name: DD_AGENT_HOST
              Value: 127.0.0.1
            - Name: DD_TRACE_ENABLED
              Value: "true"
            - Name: DD_TRACE_ROUTE_TEMPLATE_RESOURCE_NAMES_ENABLED
              Value: "true"
            - Name: DD_LOGS_INJECTION
              Value: "true"
            - Name: DD_RUNTIME_METRICS_ENABLED
              Value: "true"
            - Name: DD_PROFILING_ENABLED
              Value: "true"
            - Name: DD_IAST_ENABLED
              Value: "true"
            - Name: DD_DATA_STREAMS_ENABLED
              Value: "true"
            - Name: ECS_ENABLE_CONTAINER_METADATA
              Value: "true"
          Secrets:
            # JDBC connection credentials (3 separate secrets)
            - Name: QUARKUS_DATASOURCE_JDBC_URL
              ValueFrom: !GetAtt ConnectionStringFormatter.JdbcUrlArn
            - Name: QUARKUS_DATASOURCE_USERNAME
              ValueFrom: !GetAtt ConnectionStringFormatter.UsernameArn
            - Name: QUARKUS_DATASOURCE_PASSWORD
              ValueFrom: !GetAtt ConnectionStringFormatter.PasswordArn
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/api/stickers/v1 || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 120
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref StickerCatalogueLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: sticker-catalogue
        # Datadog Agent Sidecar Container
        - Name: datadog-agent
          Image: public.ecr.aws/datadog/agent:latest
          Essential: false
          PortMappings:
            - ContainerPort: 8126
              Protocol: tcp
            - ContainerPort: 8125
              Protocol: udp
          Environment:
            - Name: DD_APM_ENABLED
              Value: "true"
            - Name: DD_APM_NON_LOCAL_TRAFFIC
              Value: "true"
            - Name: ECS_FARGATE
              Value: "true"
            - Name: DD_SITE
              Value: datadoghq.com
            - Name: DD_ENV
              Value: production
            - Name: DD_SERVICE
              Value: sticker-catalogue
            - Name: DD_VERSION
              Value: "1.0.2"
            - Name: DD_LOG_LEVEL
              Value: ERROR
          Secrets:
            - Name: DD_API_KEY
              ValueFrom: !Ref DatadogApiKeySecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DatadogAgentLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: datadog
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # Service Discovery
  #############################################################################

  ServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: catalogue.api
      NamespaceId:
        Fn::ImportValue: !Sub "${SharedStackName}-ServiceDiscoveryNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: SRV
            TTL: 60
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # ECS Service
  #############################################################################

  StickerCatalogueService:
    Type: AWS::ECS::Service
    DependsOn:
      - StickerCatalogueApiIntegration
    Properties:
      ServiceName: !Sub stickerlandia-sticker-catalogue
      Cluster: !Ref StickerCatalogueCluster
      TaskDefinition: !Ref StickerCatalogueTaskDefinition
      DesiredCount: 1
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${SharedStackName}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${SharedStackName}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${SharedStackName}-SharedSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt ServiceDiscoveryService.Arn
          ContainerName: sticker-catalogue
          ContainerPort: 8080
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: sticker-catalogue

  #############################################################################
  # API Gateway Integration
  #############################################################################

  StickerCatalogueApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    DependsOn: ServiceDiscoveryService
    Properties:
      ApiId:
        Fn::ImportValue: !Sub "${SharedStackName}-HttpApiId"
      IntegrationType: HTTP_PROXY
      IntegrationUri: !GetAtt ServiceDiscoveryService.Arn
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId:
        Fn::ImportValue: !Sub "${SharedStackName}-VpcLinkId"
      PayloadFormatVersion: "1.0"

  StickersApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId:
        Fn::ImportValue: !Sub "${SharedStackName}-HttpApiId"
      RouteKey: "ANY /api/stickers/v1/{proxy+}"
      Target: !Sub "integrations/${StickerCatalogueApiIntegration}"

#############################################################################
# Outputs
#############################################################################

Outputs:
  StickerCatalogueClusterArn:
    Description: Sticker Catalogue ECS Cluster ARN
    Value: !GetAtt StickerCatalogueCluster.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ClusterArn"

  StickerCatalogueClusterName:
    Description: Sticker Catalogue ECS Cluster Name
    Value: !Ref StickerCatalogueCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  StickerImagesBucketName:
    Description: S3 Bucket name for sticker images
    Value: !Ref StickerImagesBucket
    Export:
      Name: !Sub "${AWS::StackName}-StickerImagesBucketName"

  StickerImagesBucketArn:
    Description: S3 Bucket ARN for sticker images
    Value: !GetAtt StickerImagesBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-StickerImagesBucketArn"

  ServiceDiscoveryServiceArn:
    Description: Service Discovery Service ARN
    Value: !GetAtt ServiceDiscoveryService.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceDiscoveryServiceArn"
