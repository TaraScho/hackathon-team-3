version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: driftguard
      POSTGRES_PASSWORD: driftguard
      POSTGRES_DB: driftguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U driftguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  datadog-agent:
    image: datadog/agent:latest
    container_name: datadog-agent
    environment:
      DD_API_KEY: ${DATADOG_API_KEY}
      DD_SITE: ${DATADOG_SITE:-datadoghq.com}
      DD_LOGS_ENABLED: true
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: true
      DD_APM_ENABLED: true
      DD_APM_NON_LOCAL_TRAFFIC: true
      DD_PROCESS_AGENT_ENABLED: true
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"
    healthcheck:
      test: ["CMD-SHELL", "agent health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://driftguard:driftguard@postgres:5432/driftguard
      REDIS_URL: redis://redis:6379/0
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    labels:
      com.datadoghq.tags.service: "driftguard-api"
      com.datadoghq.tags.env: "${APP_ENV:-development}"
      com.datadoghq.tags.version: "0.1.0"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.queue.worker
    environment:
      DATABASE_URL: postgresql://driftguard:driftguard@postgres:5432/driftguard
      REDIS_URL: redis://redis:6379/0
      DATADOG_API_KEY: ${DATADOG_API_KEY}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY}
      DATADOG_SITE: ${DATADOG_SITE:-datadoghq.com}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      datadog-agent:
        condition: service_healthy
    labels:
      com.datadoghq.tags.service: "driftguard-worker"
      com.datadoghq.tags.env: "${APP_ENV:-development}"
      com.datadoghq.tags.version: "0.1.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
      - datadog-agent
    labels:
      com.datadoghq.tags.service: "driftguard-frontend"
      com.datadoghq.tags.env: "${APP_ENV:-development}"
      com.datadoghq.tags.version: "0.1.0"

volumes:
  postgres_data:
  redis_data:
