  #############################################################################
  # Datadog Action Role for Workflow Automation
  # This role allows Datadog workflows to perform actions in AWS
  # The trust policy will be updated by the ConfigureDatadog Lambda with the
  # external ID from the Datadog action connection
  #############################################################################

  DatadogActionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DatadogActionRole
      Description: IAM role for Datadog Workflow Automation to perform actions in AWS
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: DatadogIAMManagementPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:DeleteRole
                  - iam:ListPolicies
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                Resource: '*'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: 'placeholder-will-be-updated'
      Tags:
        - Key: App
          Value: stickerlandia
        - Key: Service
          Value: datadog-automation

