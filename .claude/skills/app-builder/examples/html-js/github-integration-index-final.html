<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoamList</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>&#127757; RoamList &#127757;</h1>
        <p><i>Dream. Plan. Roam. Your ultimate travel wish list for unforgettable adventures.</i></p>
    </header>
    <main>
        <section id="itinerary-form">
            <h2>&#128221; Plan Your Next Adventure</h2>
            <form id="form">
                <label for="destination">Destination:</label>
                <input type="text" id="destination" required>
                <br><br>
                <label for="date">Tentative Date:</label>
                <input type="date" id="date" required>
                <br><br>
                <label for="activities">Activity ideas:</label>
                <textarea id="activities" required></textarea>
                <br><br>
                <label for="restaurants">Restaurants:</label>
                <textarea id="restaurants" required></textarea>
                <br><br>
                <button type="submit">Add Trip</button>
            </form>
        </section>
        <section id="itinerary-list">
            <h2>&#128506; Dream Destinations</h2>
            <ul id="list"></ul>
        </section>
    </main>
    <script src="scripts/app.js"></script>
</body>
</html>
