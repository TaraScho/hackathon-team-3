AWSTemplateFormatVersion: "2010-09-09"
Description: Stickerlandia Shared Infrastructure - VPC, API Gateway, CloudFront, RDS Aurora, EventBridge, Service Discovery

Parameters:
  VpcCidr:
    Type: String
    Default: "10.20.0.0/16"
    Description: CIDR block for the VPC

  DBName:
    Type: String
    Default: stickerlandia
    Description: Name of the database

Resources:
  #############################################################################
  # VPC and Networking
  #############################################################################

  StickerlandiaVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-vpc
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-igw
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref StickerlandiaVPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnets (for NAT Gateway, ALB if needed)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StickerlandiaVPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.20.0.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-public-1
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StickerlandiaVPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.20.1.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-public-2
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # Private Subnets 
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StickerlandiaVPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.20.100.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-private-1
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StickerlandiaVPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.20.101.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-private-2
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # Isolated Subnets (for RDS - no internet access)
  IsolatedSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StickerlandiaVPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.20.200.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-isolated-1
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  IsolatedSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StickerlandiaVPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.20.201.0/24
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-isolated-2
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # NAT Gateway
  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: GatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-nat-eip
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-nat
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StickerlandiaVPC
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-public-rt
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StickerlandiaVPC
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-private-rt
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # Isolated subnets have no route to internet (no route table association needed beyond default)
  IsolatedRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StickerlandiaVPC
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-isolated-rt
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  IsolatedSubnet1RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IsolatedSubnet1
      RouteTableId: !Ref IsolatedRouteTable

  IsolatedSubnet2RouteTableAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IsolatedSubnet2
      RouteTableId: !Ref IsolatedRouteTable

  # VPC Endpoints for S3 
  S3VpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcId: !Ref StickerlandiaVPC
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PublicRouteTable
        - !Ref PrivateRouteTable
        - !Ref IsolatedRouteTable

  # VPC Endpoint for DynamoDB
  DynamoDBVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.dynamodb
      VpcId: !Ref StickerlandiaVPC
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable
        - !Ref IsolatedRouteTable

  #############################################################################
  # Security Groups
  #############################################################################

  # Shared Security Group - Used by VPC Link, ECS Tasks, and Lambda functions
  # - Self-referencing rules on ports 8080 and 3000 for container-to-container communication
  # - VPC CIDR rules on ports 8080 and 3000 for API Gateway VPC Link access
  # - Port 8080: User Service (.NET), Sticker Catalogue (Java), Sticker Award (Go)
  # - Port 3000: Web Backend BFF (Node.js)
  SharedSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: No inbound / all outbound - shared security group for Stickerlandia services
      VpcId: !Ref StickerlandiaVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Ref VpcCidr
          Description: Allow traffic from within VPC on port 8080
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: !Ref VpcCidr
          Description: Allow traffic from within VPC on port 3000 (web-backend BFF)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-shared-sg
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # Self-referencing ingress for container-to-container and service-to-service communication
  SharedSecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SharedSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref SharedSecurityGroup
      Description: Allow self-referencing traffic on port 8080

  # Self-referencing ingress for web-backend BFF on port 3000
  SharedSecurityGroupSelfIngressPort3000:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SharedSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref SharedSecurityGroup
      Description: Allow self-referencing traffic on port 3000 (web-backend BFF)

  # Security Group for RDS
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Stickerlandia Aurora PostgreSQL
      VpcId: !Ref StickerlandiaVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: !Ref VpcCidr
          Description: Allow PostgreSQL from within VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-db-sg
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  #############################################################################
  # API Gateway (HTTP API)
  #############################################################################

  StickerlandiaHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub stickerlandia-api
      Description: Stickerlandia HTTP API Gateway
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - "*"
        AllowHeaders:
          - "*"
        ExposeHeaders:
          - "*"
        MaxAge: 86400
      Tags:
        App: stickerlandia
        Environment: production
        Service: shared-resources

  StickerlandiaHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref StickerlandiaHttpApi
      StageName: $default
      AutoDeploy: true
      Tags:
        App: stickerlandia
        Environment: production
        Service: shared-resources

  # VPC Link for private integrations
  # Uses the shared security group (matches CDK pattern)
  StickerlandiaVpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !Sub stickerlandia-vpclink
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref SharedSecurityGroup
      Tags:
        App: stickerlandia
        Environment: production
        Service: shared-resources

  #############################################################################
  # S3 Bucket for Web Frontend
  #############################################################################

  WebFrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub stickerlandia-web-frontend-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - "*"
            MaxAge: 3600
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-web-frontend
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # CloudFront Origin Access Identity
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for stickerlandia web frontend

  # S3 Bucket Policy to allow CloudFront access
  WebFrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebFrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub "${WebFrontendBucket.Arn}/*"

  #############################################################################
  # CloudFront Distribution
  #############################################################################

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: Stickerlandia distribution

        Origins:
          # S3 Origin for static web assets
          - Id: S3Origin
            DomainName: !GetAtt WebFrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}

          # API Gateway Origin
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${StickerlandiaHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true

        CacheBehaviors:
          # /api/* routes to API Gateway
          - PathPattern: /api/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
                - Accept
                - Origin
                - Access-Control-Request-Method
                - Access-Control-Request-Headers
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0

          # /.well-known/* routes to API Gateway
          - PathPattern: /.well-known/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: none
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0

          # /auth/* routes to API Gateway
          - PathPattern: /auth/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0

          # /Auth/* routes to API Gateway (case variation)
          - PathPattern: /Auth/*
            TargetOriginId: ApiGatewayOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0

        # SPA routing - return index.html for 403/404
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021

        PriceClass: PriceClass_100
        HttpVersion: http2

      Tags:
        - Key: Name
          Value: !Sub stickerlandia-distribution
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  #############################################################################
  # RDS Aurora PostgreSQL Serverless v2
  #############################################################################

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Isolated subnets for Stickerlandia Aurora PostgreSQL
      SubnetIds:
        - !Ref IsolatedSubnet1
        - !Ref IsolatedSubnet2
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-db-subnet-group
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  DBMasterUserSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub stickerlandia-db-secret
      Description: Master user credentials for Stickerlandia Aurora PostgreSQL
      GenerateSecretString:
        SecretStringTemplate: '{"username": "postgres"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-db-secret
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  StickerlandiaDBCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: !Sub stickerlandia-db
      Engine: aurora-postgresql
      EngineVersion: "17.4"
      EngineMode: provisioned
      Port: 5432
      DatabaseName: !Ref DBName
      MasterUsername: !Join
        - ""
        - - "{{resolve:secretsmanager:"
          - !Ref DBMasterUserSecret
          - ":SecretString:username}}"
      MasterUserPassword: !Join
        - ""
        - - "{{resolve:secretsmanager:"
          - !Ref DBMasterUserSecret
          - ":SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0
        MaxCapacity: 1
      BackupRetentionPeriod: 7
      DeletionProtection: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-db-cluster
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  StickerlandiaDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub stickerlandia-db-instance
      DBClusterIdentifier: !Ref StickerlandiaDBCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PromotionTier: 1
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-db-instance
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  # Aurora Reader Instance (matches CDK which creates writer + reader)
  StickerlandiaDBReaderInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub stickerlandia-db-reader
      DBClusterIdentifier: !Ref StickerlandiaDBCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PromotionTier: 2
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-db-reader
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  #############################################################################
  # EventBridge Event Bus
  #############################################################################

  StickerlandiaEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub stickerlandia-event-bus
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-event-bus
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

  #############################################################################
  # Service Discovery (Cloud Map)
  #############################################################################

  ServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Sub stickerlandia.local
      Vpc: !Ref StickerlandiaVPC
      Description: Private DNS namespace for Stickerlandia service discovery
      Tags:
        - Key: Name
          Value: !Sub stickerlandia-namespace
        - Key: App
          Value: stickerlandia
        - Key: Environment
          Value: production
        - Key: Service
          Value: shared-resources

#############################################################################
# Outputs
#############################################################################

Outputs:
  # Stack Name (for nested stack reference)
  StackName:
    Description: The name of this stack (for use by dependent stacks)
    Value: !Ref AWS::StackName
    Export:
      Name: !Sub "${AWS::StackName}-StackName"

  # VPC Outputs
  VpcId:
    Description: Stickerlandia VPC ID
    Value: !Ref StickerlandiaVPC
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

  VpcCidr:
    Description: VPC CIDR Block
    Value: !Ref VpcCidr
    Export:
      Name: !Sub "${AWS::StackName}-VpcCidr"

  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnet1Id"

  PublicSubnet2Id:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub "${AWS::StackName}-PublicSubnet2Id"

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet1Id"

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "${AWS::StackName}-PrivateSubnet2Id"

  IsolatedSubnet1Id:
    Description: Isolated Subnet 1 ID
    Value: !Ref IsolatedSubnet1
    Export:
      Name: !Sub "${AWS::StackName}-IsolatedSubnet1Id"

  IsolatedSubnet2Id:
    Description: Isolated Subnet 2 ID
    Value: !Ref IsolatedSubnet2
    Export:
      Name: !Sub "${AWS::StackName}-IsolatedSubnet2Id"

  # API Gateway Outputs
  HttpApiId:
    Description: HTTP API Gateway ID
    Value: !Ref StickerlandiaHttpApi
    Export:
      Name: !Sub "${AWS::StackName}-HttpApiId"

  HttpApiEndpoint:
    Description: HTTP API Gateway Endpoint URL
    Value: !Sub "https://${StickerlandiaHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-HttpApiEndpoint"

  VpcLinkId:
    Description: VPC Link ID
    Value: !Ref StickerlandiaVpcLink
    Export:
      Name: !Sub "${AWS::StackName}-VpcLinkId"

  # CloudFront and S3 Outputs
  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDistributionId"

  CloudFrontDomainName:
    Description: CloudFront Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDomainName"

  WebFrontendBucketName:
    Description: S3 Bucket Name for Web Frontend
    Value: !Ref WebFrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-WebFrontendBucketName"

  WebFrontendBucketArn:
    Description: S3 Bucket ARN for Web Frontend
    Value: !GetAtt WebFrontendBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-WebFrontendBucketArn"

  BaseUrl:
    Description: Base URL for Stickerlandia application
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-BaseUrl"

  # Database Outputs
  DBClusterEndpoint:
    Description: Aurora PostgreSQL Cluster Endpoint
    Value: !GetAtt StickerlandiaDBCluster.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-DBClusterEndpoint"

  DBClusterPort:
    Description: Aurora PostgreSQL Cluster Port
    Value: !GetAtt StickerlandiaDBCluster.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-DBClusterPort"

  DBSecretArn:
    Description: ARN of the Secrets Manager secret for DB credentials
    Value: !Ref DBMasterUserSecret
    Export:
      Name: !Sub "${AWS::StackName}-DBSecretArn"

  DBClusterIdentifier:
    Description: Aurora PostgreSQL Cluster Identifier
    Value: !Ref StickerlandiaDBCluster
    Export:
      Name: !Sub "${AWS::StackName}-DBClusterIdentifier"

  DBName:
    Description: Database name (used by all services)
    Value: !Ref DBName
    Export:
      Name: !Sub "${AWS::StackName}-DBName"

  # EventBridge Outputs
  EventBusName:
    Description: EventBridge Event Bus Name
    Value: !Ref StickerlandiaEventBus
    Export:
      Name: !Sub "${AWS::StackName}-EventBusName"

  EventBusArn:
    Description: EventBridge Event Bus ARN
    Value: !GetAtt StickerlandiaEventBus.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EventBusArn"

  # Service Discovery Outputs
  ServiceDiscoveryNamespaceId:
    Description: Service Discovery Namespace ID
    Value: !Ref ServiceDiscoveryNamespace
    Export:
      Name: !Sub "${AWS::StackName}-ServiceDiscoveryNamespaceId"

  ServiceDiscoveryNamespaceArn:
    Description: Service Discovery Namespace ARN
    Value: !GetAtt ServiceDiscoveryNamespace.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceDiscoveryNamespaceArn"

  ServiceDiscoveryNamespaceName:
    Description: Service Discovery Namespace Name
    Value: !Sub stickerlandia.local
    Export:
      Name: !Sub "${AWS::StackName}-ServiceDiscoveryNamespaceName"

  # Security Group Outputs
  # Single shared security group (matches CDK noInboundAllOutboundSecurityGroup pattern)
  SharedSecurityGroupId:
    Description: Shared Security Group ID for VPC Link, ECS Tasks, and Lambda functions
    Value: !Ref SharedSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SharedSecurityGroupId"

  DBSecurityGroupId:
    Description: Security Group ID for Database
    Value: !Ref DBSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-DBSecurityGroupId"
